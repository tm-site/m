    :root {
      --rog-red: #ff003c;
      --rog-cyan: #00f0ff;
      --rog-purple: #7b2cbf;
      --rog-dark: #06070a;
    }
    body {
      background-color: var(--rog-dark);
      color: #f3f4f6;
      font-family: 'Cairo', 'Inter', sans-serif;
      overflow-x: hidden;
    }
    .glass {
      background: rgba(18, 19, 26, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    @keyframes rgbMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .rgb-border {
      position: relative;
    }
    .rgb-border::after {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(45deg, var(--rog-red), var(--rog-purple), var(--rog-cyan), var(--rog-red));
      background-size: 300% 300%;
      animation: rgbMove 5s ease infinite;
      border-radius: inherit;
      z-index: -1;
      pointer-events: none;
    }
    .rog-btn {
      background: linear-gradient(90deg, #ff003c 0%, #7b2cbf 100%);
      color: white;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(255, 0, 60, 0.2);
    }
    .rog-btn:hover {
      box-shadow: 0 0 18px rgba(255, 0, 60, 0.5);
      transform: translateY(-2px);
    }
    .page-enter {
      animation: fadeIn 0.3s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Simple Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      pointer-events: none;
    }
    .toast {
      background: rgba(18, 19, 26, 0.95);
      border: 1px solid var(--rog-red);
      box-shadow: 0 0 15px rgba(255, 0, 60, 0.3);
      animation: toastIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
    }
    @keyframes toastIn {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>

    // --- CART LOGIC ---
    function addToCart(productId) {
      const existing = state.cart.find(item => item.id === productId);
      if (existing) {
        existing.qty++;
      } else {
        state.cart.push({ id: productId, qty: 1 });
      }
      saveCart();
      showToast(t("add_cart_success"));
      render();
    }

    function removeFromCart(productId) {
      state.cart = state.cart.filter(item => item.id !== productId);
      saveCart();
      showToast(t("item_removed_cart"));
      render();
    }

    function updateQty(productId, newQty) {
      const item = state.cart.find(i => i.id === productId);
      if (item) {
        item.qty = Math.max(1, newQty);
        saveCart();
        render();
      }
    }

    function cartTotal() {
      return state.cart.reduce((sum, item) => {
        const prod = state.products.find(p => p.id === item.id);
        return sum + (prod ? prod.price * item.qty : 0);
      }, 0);
    }

    // --- WISHLIST LOGIC ---
    function toggleWishlist(productId) {
      if (!state.user) {
        showToast(t("log_in_first"));
        navigate("login");
        return;
      }
      if (!state.user.wishlist) state.user.wishlist = [];
      const index = state.user.wishlist.indexOf(productId);
      if (index > -1) {
        state.user.wishlist.splice(index, 1);
        showToast(t("remove_wishlist_success"));
      } else {
        state.user.wishlist.push(productId);
        showToast(t("add_wishlist_success"));
      }
      saveUser();
      render();
    }

    // --- COMPARE LOGIC (MAX 2 ITEMS) ---
    function toggleCompare(productId) {
      if (!state.user) {
        showToast(t("log_in_first"));
        navigate("login");
        return;
      }
      if (!state.user.compare) state.user.compare = [];
      const index = state.user.compare.indexOf(productId);
      if (index > -1) {
        state.user.compare.splice(index, 1);
        render();
      } else {
        if (state.user.compare.length >= 2) {
          showToast(t("compare_limit"));
          return;
        }
        state.user.compare.push(productId);
        showToast(t("add_compare_success"));
      }
      saveUser();
      render();
    }

    // --- REVIEW LOGIC ---
    function addReview(productId, text, stars) {
      if (!state.user) {
        showToast(t("log_in_first"));
        return;
      }
      if (!text.trim()) {
        showToast(t("fields_required"));
        return;
      }
      const prod = state.products.find(p => p.id === productId);
      if (prod) {
        if (!prod.reviews) prod.reviews = [];
        prod.reviews.push({
          user: state.user.name,
          text: text,
          stars: parseInt(stars) || 5,
          date: new Date().toISOString().split("T")[0]
        });
        saveProducts();
        showToast(t("review_success"));
        render();
      }
    }

      if (state.currentPage === "register") return renderRegister();
      if (state.currentPage === "wishlist") return renderWishlist();
      if (state.currentPage === "compare") return renderCompare();
      if (state.currentPage === "about") return renderAbout();
      if (state.currentPage === "contact") return renderContact();
      if (state.currentPage === "blog") return renderBlog();
      if (state.currentPage === "support") return renderSupport();
      if (state.currentPage === "checkout") return renderCheckout();
      if (state.currentPage === "orders") return renderOrders();
      if (state.currentPage === "admin") return renderAdmin();
      
      if (state.currentPage.startsWith("product-")) {

      return renderStore();

        return;

      const orderObj = {

        items: [...state.cart],
        total: cartTotal(),
        date: new Date().toLocaleString(state.currentLang === "ar" ? "ar-IQ" : "en-US"),

      if (!state.user.orders) state.user.orders = [];
      state.user.orders.push(orderObj);
      saveUser();

      saveCart();

            <div>
              <label class="block text-xs uppercase tracking-wider text-gray-400 font-mono mb-2">${t('contact_email')}</label>
              <input type="email" id="contact-email" class="w-full glass py-2 px-3 rounded-lg text-xs text-white placeholder-gray-500 focus:outline-none focus:border-rog-red" />
            </div>
            <div>
              <label class="block text-xs uppercase tracking-wider text-gray-400 font-mono mb-2">${t('contact_message')}</label>
              <textarea id="contact-message" rows="4" class="w-full glass p-3 rounded-lg text-xs text-white placeholder-gray-500 focus:outline-none focus:border-rog-red"></textarea>
            </div>
          </div>

          <button onclick="submitContactAction()" class="rog-btn w-full py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider" id="contact-form-submit">
            ${t('contact_submit')}
          </button>
        </div>
      `;
    }

    function submitContactAction() {
      const name = document.getElementById("contact-name").value;
      const email = document.getElementById("contact-email").value;
      const desc = document.getElementById("contact-message").value;

      if (!name.trim() || !email.trim() || !desc.trim()) {
        showToast(t("fields_required"));
        return;
      }
      showToast(t("msg_sent"));
      navigate("store");
    }

    function renderSupport() {
      if (!state.user) return "";
      return `
        <div class="max-w-xl mx-auto glass p-8 rounded-3xl border border-white/[0.08]">
          <h1 class="text-xl font-extrabold text-white mb-6 italic tracking-tight">${t('support')}</h1>
          
          <div class="space-y-4 mb-6">
            <div>
              <label class="block text-xs uppercase text-gray-400 font-mono mb-2">${t('support_title')}</label>
              <input type="text" id="support-title" class="w-full glass py-2 px-3 rounded-lg text-xs text-white focus:outline-none focus:border-rog-red" />
            </div>
            <div>
              <label class="block text-xs uppercase text-gray-400 font-mono mb-2">${t('support_desc')}</label>
              <textarea id="support-desc" rows="4" class="w-full glass p-3 rounded-lg text-xs text-white focus:outline-none focus:border-rog-red"></textarea>
            </div>
          </div>

          <button onclick="submitSupportAction()" class="rog-btn w-full py-2.5 rounded-xl text-xs font-bold uppercase tracking-wider" id="support-form-submit">
            ${t('support_submit')}
          </button>
        </div>
      `;
    }

    function submitSupportAction() {
      const title = document.getElementById("support-title").value;
      const desc = document.getElementById("support-desc").value;

      if (!title.trim() || !desc.trim()) {
        showToast(t("fields_required"));
        return;
      }
      showToast(t("ticket_submitted") + ": #" + Math.floor(Math.random() * 90000 + 10000));
      navigate("store");
    }

    function renderBlog() {
      return `
        <h1 class="text-2xl font-extrabold text-white mb-6 uppercase tracking-wider">${t('blog')}</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          ${BLOG_POSTS.map(post => `
            <div class="glass p-6 rounded-2xl border border-white/[0.05] relative overflow-hidden group">
              <div class="absolute -top-3 left-4 bg-rog-red text-white text-[9px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">${post.date}</div>
              <h2 class="text-md font-bold text-white mt-4 mb-3 group-hover:text-rog-red transition-all duration-300">${post.title}</h2>
              <p class="text-xs text-gray-400 leading-relaxed mb-4">${post.content}</p>
            </div>
          `).join('')}
        </div>
      `;
    }

    // --- AUTH LOGIN / REGISTER ---
    function renderLogin() {
      return `
        <div class="max-w-md mx-auto glass p-8 rounded-3xl border border-white/[0.08]" id="auth-login-card">
          <div class="text-center mb-6">
            <h1 class="text-xl font-extrabold text-white italic tracking-tight">${t('welcome_back')}</h1>
          </div>

          <div class="space-y-4 mb-6">
            <div>
              <label class="block text-xs uppercase text-gray-400 font-mono mb-2">${t('email')}</label>
              <input type="email" id="login-email" class="w-full glass py-2.5 px-3 rounded-xl text-sm text-white focus:outline-none focus:border-rog-red" />
            </div>
            <div>
              <label class="block text-xs uppercase text-gray-400 font-mono mb-2">${t('password')}</label>
              <input type="password" id="login-password" class="w-full glass py-2.5 px-3 rounded-xl text-sm text-white focus:outline-none focus:border-rog-red" />
            </div>
          </div>

          <button onclick="loginAction()" class="rog-btn w-full py-3 rounded-xl text-xs font-bold uppercase tracking-wider mb-4" id="login-submit-btn">
            ${t('login')}
          </button>
          
          <div class="text-center">
            <span class="text-xs text-gray-500">${t('dont_have_account')}</span>
            <a onclick="navigate('register')" class="text-xs text-rog-red font-bold underline ml-1 cursor-pointer">${t('register')}</a>
          </div>
        </div>
      `;
    }

    function loginAction() {
      const email = document.getElementById("login-email").value;
      const pass = document.getElementById("login-password").value;

      if (!email.trim() || !pass.trim()) {
        showToast(t("fields_required"));
        return;
      }

      // Check users database in storage or create automatic profile for testability
      state.user = {
        name: email.split("@")[0].toUpperCase(),
        email: email,
        password: pass,
        orders: [],
        wishlist: [],
        compare: []
      };
      saveUser();
      showToast(t("login_success"));
      navigate("store");
    }

    function renderRegister() {
      return `
        <div class="max-w-md mx-auto glass p-8 rounded-3xl border border-white/[0.08]" id="auth-register-card">
          <div class="text-center mb-6">
            <h1 class="text-xl font-extrabold text-white italic tracking-tight">${t('join_rebellion')}</h1>
          </div>

          <div class="space-y-4 mb-6">
            <div>
              <label class="block text-xs uppercase text-gray-400 font-mono mb-2">${t('fullname')}</label>
              <input type="text" id="register-fullname" class="w-full glass py-2.5 px-3 rounded-xl text-sm text-white focus:outline-none focus:border-rog-red" />
            </div>
            <div>
              <label class="block text-xs uppercase text-gray-400 font-mono mb-2">${t('email')}</label>
              <input type="email" id="register-email" class="w-full glass py-2.5 px-3 rounded-xl text-sm text-white focus:outline-none focus:border-rog-red" />
            </div>
            <div>
              <label class="block text-xs uppercase text-gray-400 font-mono mb-2">${t('password')}</label>
              <input type="password" id="register-password" class="w-full glass py-2.5 px-3 rounded-xl text-sm text-white focus:outline-none focus:border-rog-red" />
            </div>
          </div>

          <button onclick="registerAction()" class="rog-btn w-full py-3 rounded-xl text-xs font-bold uppercase tracking-wider mb-4" id="register-submit-btn">
            ${t('register')}
          </button>
          
          <div class="text-center">
            <span class="text-xs text-gray-500">${t('have_account')}</span>
            <a onclick="navigate('login')" class="text-xs text-rog-red font-bold underline ml-1 cursor-pointer">${t('login')}</a>
          </div>
        </div>
      `;
    }

    function registerAction() {
      const name = document.getElementById("register-fullname").value;
      const email = document.getElementById("register-email").value;
      const pass = document.getElementById("register-password").value;

      if (!name.trim() || !email.trim() || !pass.trim()) {
        showToast(t("fields_required"));
        return;
      }

      state.user = {
        name: name,
        email: email,
        password: pass,
        orders: [],
        wishlist: [],
        compare: []
      };
      saveUser();
      showToast(t("register_success"));
      navigate("store");
    }

    function logout() {
      state.user = null;
      localStorage.removeItem("rog_user_pro");
      // Optional: Clear active cart
      showToast(t("logout_success"));
      navigate("store");
    }

    // --- OPERATIONAL ADMIN MODULES (Secured 002006) ---
    function triggerAdmin() {
      if (state.adminLogged) {
        navigate("admin");
      } else {
        const passPrompt = prompt("Enter Administration Decryption Key:");
        if (passPrompt === "002006") {
          state.adminLogged = true;
          saveAdminState();
          showToast(t("admin_login_success"));
          navigate("admin");
        } else {
          showToast(t("unauthorized_admin"));
        }
      }
    }

    function setAdminSection(section) {
      state.adminSection = section;
      render();
    }

    function renderAdmin() {
      if (!state.adminLogged) return "";

      const sidebarActive = "p-2.5 bg-rog-red text-white rounded-lg text-xs font-bold text-center";
      const sidebarIdle = "p-2.5 bg-white/[0.02] border border-white/[0.05] text-gray-400 hover:text-white rounded-lg text-xs font-bold text-center";

      return `
        <div class="flex flex-col lg:flex-row gap-6">
          <!-- Left Console Admin tabs -->
          <div class="w-full lg:w-56 glass rounded-2xl p-4 border border-white/[0.08] flex flex-row lg:flex-col gap-2 overflow-x-auto lg:overflow-visible shrink-0">
            <button onclick="setAdminSection('dashboard')" class="${state.adminSection === 'dashboard' ? sidebarActive : sidebarIdle}">
              ${t('admin_dashboard')}
            </button>
            <button onclick="setAdminSection('products')" class="${state.adminSection === 'products' ? sidebarActive : sidebarIdle}">
              ${t('admin_products')}
            </button>
            <button onclick="setAdminSection('orders')" class="${state.adminSection === 'orders' ? sidebarActive : sidebarIdle}">
              ${t('admin_orders')}
            </button>
            <button onclick="setAdminSection('users')" class="${state.adminSection === 'users' ? sidebarActive : sidebarIdle}">
              ${t('admin_users')}
            </button>
            <button onclick="setAdminSection('settings')" class="${state.adminSection === 'settings' ? sidebarActive : sidebarIdle}">
               System Language
            </button>
          </div>

          <!-- Right Content Dynamic Screen -->
          <div class="flex-grow glass rounded-2xl p-6 border border-white/[0.08]" id="admin-main-pane">
            ${renderAdminContent()}
          </div>
        </div>
      `;
    }

    function renderAdminContent() {
      if (state.adminSection === "dashboard") {
        return `
          <h2 class="text-md font-bold text-white mb-6 uppercase tracking-wider">${t('admin_dashboard')}</h2>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
            <div class="p-4 bg-black/40 border border-[#7b2cbf]/30 rounded-xl relative overflow-hidden">
              <span class="text-[9px] uppercase tracking-wider text-gray-500 font-mono">FINANCES</span>
              <div class="text-lg font-mono font-extrabold text-[#7b2cbf] mt-2">
                ${formatIQD(state.user && state.user.orders ? state.user.orders.reduce((sum, o) => sum + o.total, 0) : 0)}
              </div>
            </div>

            <div class="p-4 bg-black/40 border border-rog-red/30 rounded-xl relative overflow-hidden">
              <span class="text-[9px] uppercase tracking-wider text-gray-500 font-mono">PRODUCTS COUNT</span>
              <div class="text-lg font-mono font-extrabold text-rog-red mt-2">${state.products.length}</div>
            </div>

            <div class="p-4 bg-black/40 border border-rog-cyan/30 rounded-xl relative overflow-hidden">
              <span class="text-[9px] uppercase tracking-wider text-gray-500 font-mono">ACTIVE USERS</span>
              <div class="text-lg font-mono font-extrabold text-rog-cyan mt-2">1 (LOCAL SEED)</div>
            </div>
          </div>
        `;
      }

      if (state.adminSection === "products") {
        return `
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-md font-bold text-white uppercase tracking-wider">${t('admin_products')}</h2>
            <button onclick="adminAddProductprompt()" class="rog-btn px-4 py-2 rounded-xl text-xs font-bold font-mono">
              + ${t('add_product').toUpperCase()}
            </button>
          </div>

          <div class="space-y-4 max-h-96 overflow-y-auto pr-2">
            ${state.products.map(p => `
              <div class="p-3 bg-black/40 rounded-xl border border-white/[0.05] flex justify-between items-center">
                <div class="flex items-center gap-3">
                  <div class="w-10 h-10 rounded bg-zinc-800 p-1 flex items-center justify-center shrink-0">
                    ${drawHardwareSVG(p.image).replace("w-full h-48", "w-8 h-8")}
                  </div>
                  <div>
                    <h4 class="text-xs font-bold text-white">${p.name[state.currentLang]}</h4>
                    <span class="text-[10px] font-mono text-rog-red">${formatIQD(p.price)}</span>
                  </div>
                </div>

                <div class="flex gap-2">
                  <button onclick="adminEditProductprompt('${p.id}')" class="px-2.5 py-1 bg-white/5 border border-white/10 text-[10px] rounded hover:border-rog-cyan transition-all font-mono">
                    ${t('edit_product')}
                  </button>
                  <button onclick="adminDeleteProductAction('${p.id}')" class="px-2.5 py-1 bg-rog-red/10 border border-rog-red/30 text-[10px] text-rog-red rounded hover:bg-rog-red/20 transition-all font-mono">
                    ${t('delete_product')}
                  </button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }

      if (state.adminSection === "orders") {
        const orders = state.user && state.user.orders ? state.user.orders : [];
        return `
          <h2 class="text-md font-bold text-white mb-6 uppercase tracking-wider">${t('admin_orders')}</h2>
          ${orders.length === 0 ? `
            <div class="p-8 text-center text-gray-500 border border-dashed border-white/[0.08] rounded-2xl">No orders triggered.</div>
          ` : `
            <div class="space-y-4 max-h-96 overflow-y-auto">
              ${orders.map(o => `
                <div class="p-4 bg-black/45 rounded-xl border border-white/[0.05] flex justify-between items-center flex-wrap gap-4">
                  <div>
                    <div class="text-xs font-bold text-white">${o.id}</div>
                    <div class="text-[10px] text-gray-400 mt-1">${o.shipping.name} • ${o.shipping.phone}</div>
                    <span class="text-[10px] text-rog-red font-mono font-bold block mt-1">${formatIQD(o.total)}</span>
                  </div>

                  <div class="flex gap-2 items-center">
                    <span class="text-[10px] font-bold text-rog-cyan bg-rog-cyan/5 px-2.5 py-1 rounded border border-rog-cyan/30">${o.status}</span>
                    <button onclick="adminChangeOrderStatusprompt('${o.id}')" class="px-3 py-1.5 bg-rog-red hover:bg-red-600 rounded text-[10px] font-bold text-white uppercase" id="admin-status-change-${o.id}">
                      ${t('change_status')}
                    </button>
                  </div>
                </div>
              `).join('')}
            </div>
          `}
        `;
      }

      if (state.adminSection === "users") {
        return `
          <h2 class="text-md font-bold text-white mb-6 uppercase tracking-wider">${t('admin_users')}</h2>
          ${state.user ? `
            <div class="p-4 bg-black/40 rounded-xl border border-white/[0.05] max-w-sm">
              <div class="font-bold text-sm text-white">${state.user.name}</div>
              <div class="text-xs font-mono text-gray-400 mt-1">${state.user.email}</div>
              <div class="mt-4 text-[10px] text-rog-cyan font-mono">ROLE: ROOT ADMINISTRATOR SEED</div>
            </div>
          ` : `
            <div class="p-4 text-center text-xs text-gray-500">Unauthenticated local profile.</div>
          `}
        `;
      }

      if (state.adminSection === "settings") {
        return `
          <h2 class="text-md font-bold text-white mb-6 uppercase tracking-wider">${t('admin_settings')}</h2>
          <div class="p-4 bg-black/40 border border-white/[0.05] rounded-xl text-center space-y-4">
            <p class="text-xs text-gray-400">Configure global app translation parameters dynamically:</p>
            <div class="flex justify-center gap-3">
              <button onclick="setLang('ar')" class="rog-btn px-4 py-2 rounded text-xs">العربية (Arabic)</button>
              <button onclick="setLang('en')" class="rog-btn px-4 py-2 rounded text-xs">English (US)</button>
              <button onclick="setLang('ku')" class="rog-btn px-4 py-2 rounded text-xs">کوردی (Kurdish)</button>
            </div>
          </div>
        `;
      }
      return "";
    }

    // --- PROMPT-BASED CLIENT ADMINISTRATIVE CREATIVE UTILITIES ---
    function adminAddProductprompt() {
      const nameAr = prompt("Enter product name in Arabic:");
      const nameEn = prompt("Enter product name in English:");
      const priceVal = prompt("Enter product price (IQD numeric value only):");
      
      if (!nameAr || !nameEn || !priceVal) {
        showToast(t("fields_required"));
        return;
      }

      const parsedPrice = parseInt(priceVal);
      if (isNaN(parsedPrice)) {
        showToast("Price must be a valid number!");
        return;
      }

      const pObj = {
        id: "p" + Date.now(),
        name: { ar: nameAr, en: nameEn, ku: nameAr },
        desc: { ar: "العنصر المضاف حديثاً من وحدة الإدارة.", en: "Newly custom cataloged item.", ku: "کارت نوێ زیادکراو" },
        price: parsedPrice,
        category: "other",
        brand: "ROG HUB",
        image: "cooler",
        reviews: []
      };

      state.products.push(pObj);
      saveProducts();
      showToast("Product configured successfully!");
      render();
    }

    function adminEditProductprompt(id) {
      const prod = state.products.find(item => item.id === id);
      if (!prod) return;

      const nameAr = prompt("Edit product name (Arabic):", prod.name.ar);
      const priceVal = prompt("Edit price (IQD numeric value):", prod.price);

      if (!nameAr || !priceVal) {
        showToast(t("fields_required"));
        return;
      }

      const parsedPrice = parseInt(priceVal);
      if (isNaN(parsedPrice)) return;

      prod.name.ar = nameAr;
      prod.name.en = nameAr;
      prod.name.ku = nameAr;
      prod.price = parsedPrice;

      saveProducts();
      showToast("Product updated successfully!");
      render();
    }

    function adminDeleteProductAction(id) {
      if (confirm("Are you sure you want to expel this product line?")) {
        state.products = state.products.filter(item => item.id !== id);
        saveProducts();
        showToast("Product line expelled.");
        render();
      }
    }

    function adminChangeOrderStatusprompt(orderId) {
      if (!state.user || !state.user.orders) return;
      const order = state.user.orders.find(o => o.id === orderId);
      if (!order) return;

      const newStatus = prompt(t("enter_new_status"), order.status);
      if (newStatus) {
        order.status = newStatus;
        saveUser();
        showToast("Status dynamically modified successfully!");
        render();
      }
    }

    // --- APP STARTUP & LIFE CYCLES ---
    window.onload = () => {
      // 1. Terminate loader screen with dynamic transition
      const loader = document.getElementById("loading");
      if (loader) {
        loader.classList.add("opacity-0");
        setTimeout(() => loader.remove(), 500);
      }

      // 2. Load configurations and route
      updateRtlDirection();
      render();
    };
  </script>
</body>
</html>
